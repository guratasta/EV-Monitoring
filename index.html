<!DOCTYPE html>
<html>
<head>
  <title>EV Tracking Pro</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body { margin:0; padding:0; }
    #map { height: 100vh; }

    #info {
      position: absolute;
      bottom: 20px;
      left: 10px;
      background: white;
      padding: 12px;
      z-index: 1000;
      border-radius: 8px;
      font-size: 14px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      line-height: 1.6;
    }

    #toggleFollow {
      position:absolute;
      top:10px;
      right:10px;
      z-index:1000;
      padding:10px;
      background:white;
      border:none;
      border-radius:5px;
      cursor:pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
  </style>
</head>

<body>

<div id="map"></div>

<div id="info">
  Status : - <br>
  Jarak  : 0 km <br>
  Speed  : 0 km/h <br>
  Waktu  : - <br>
  EV     : EV-001
</div>

<button id="toggleFollow">Auto Follow: ON</button>

<script>

// ================= INIT =================
var map = L.map('map').setView([-7.8, 110.36], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

var polyline = L.polyline([], {color: 'red', weight: 4}).addTo(map);

var marker = L.marker([-7.8, 110.36]).addTo(map)
  .bindTooltip("EV-001", {permanent: true, direction: "top"});

// ================= VARIABLE =================
let autoFollow = true;
let currentPosition = null;
let lastTime = null;
let totalDistance = 0;

// ================= TOGGLE =================
document.getElementById("toggleFollow").onclick = function() {
  autoFollow = !autoFollow;
  this.innerText = "Auto Follow: " + (autoFollow ? "ON" : "OFF");
};

// ================= JAM REALTIME =================
function getTimeNow() {
  let now = new Date();
  return now.toLocaleTimeString();
}

// ================= HAVERSINE =================
function getDistance(p1, p2) {
  let R = 6371;
  let dLat = (p2[0]-p1[0]) * Math.PI/180;
  let dLon = (p2[1]-p1[1]) * Math.PI/180;

  let a =
    Math.sin(dLat/2)**2 +
    Math.cos(p1[0]*Math.PI/180) *
    Math.cos(p2[0]*Math.PI/180) *
    Math.sin(dLon/2)**2;

  let c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

// ================= SMOOTH =================
function animateMarker(start, end, duration = 2000) {
  let startTime = Date.now();

  function animate() {
    let progress = (Date.now() - startTime) / duration;
    if (progress > 1) progress = 1;

    let lat = start[0] + (end[0]-start[0]) * progress;
    let lon = start[1] + (end[1]-start[1]) * progress;

    marker.setLatLng([lat, lon]);

    if (autoFollow) {
      map.setView([lat, lon], map.getZoom());
    }

    if (progress < 1) requestAnimationFrame(animate);
  }

  animate();
}

// ================= UPDATE =================
async function updateMap() {
  try {
    const res = await fetch("https://api.thingspeak.com/channels/3317591/feeds.json?results=50");
    const data = await res.json();

    let path = [];

    data.feeds.forEach(d => {
      if (d.field5 && d.field6) {
        path.push([
          parseFloat(d.field5),
          parseFloat(d.field6)
        ]);
      }
    });

    if (path.length === 0) return;

    let newPoint = path[path.length - 1];
    polyline.setLatLngs(path);

    if (!currentPosition) {
      currentPosition = newPoint;
      marker.setLatLng(newPoint);
      lastTime = Date.now();
      return;
    }

    // ================= HITUNG =================
    let now = Date.now();
    let timeDiff = (now - lastTime) / 1000; // detik
    let dist = getDistance(currentPosition, newPoint);

    let speed = 0;
    let status = "STOP";

    if (dist > 0.003) {
      totalDistance += dist;
      speed = (dist / timeDiff) * 3600;
      status = "JALAN";
    }

    lastTime = now;

    // ================= UPDATE UI =================
    document.getElementById("info").innerHTML =
      "Status : " + status + "<br>" +
      "Jarak  : " + totalDistance.toFixed(3) + " km<br>" +
      "Speed  : " + speed.toFixed(1) + " km/h<br>" +
      "Waktu  : " + getTimeNow() + "<br>" +
      "EV     : EV-001";

    // ================= ANIMASI =================
    animateMarker(currentPosition, newPoint);
    currentPosition = newPoint;

  } catch (err) {
    console.error(err);
  }
}

// ================= REALTIME =================
setInterval(() => {
  updateMap();
}, 5000);

// update jam tiap detik
setInterval(() => {
  document.getElementById("info").innerHTML =
    document.getElementById("info").innerHTML.replace(
      /Waktu\s*:.*<br>/,
      "Waktu  : " + getTimeNow() + "<br>"
    );
}, 1000);

</script>

</body>
</html>
