<!DOCTYPE html>
<html>
<head>
  <title>EV Tracking Smooth</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body { margin:0; padding:0; }
    #map { height: 100vh; }

    /* PANEL INFO DIPINDAH KE BAWAH */
    #info {
      position: absolute;
      bottom: 20px;
      left: 10px;
      background: white;
      padding: 10px;
      z-index: 1000;
      border-radius: 8px;
      font-size: 14px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }

    #toggleFollow {
      position:absolute;
      top:10px;
      right:10px;
      z-index:1000;
      padding:10px;
      background:white;
      border:none;
      border-radius:5px;
      cursor:pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
  </style>
</head>

<body>

<div id="map"></div>

<div id="info">
  Status: - <br>
  Kendaraan: EV-001
</div>

<button id="toggleFollow">Auto Follow: ON</button>

<script>

// ================= INIT =================
var map = L.map('map').setView([-7.8, 110.36], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

var polyline = L.polyline([], {color: 'red', weight: 4}).addTo(map);

// ================= MARKER DENGAN NAMA =================
var marker = L.marker([-7.8, 110.36]).addTo(map)
  .bindPopup("EV-001")
  .bindTooltip("EV-001", {permanent: true, direction: "top"});

// ================= VARIABLE =================
let autoFollow = true;
let currentPosition = null;

// ================= TOGGLE =================
document.getElementById("toggleFollow").onclick = function() {
  autoFollow = !autoFollow;
  this.innerText = "Auto Follow: " + (autoFollow ? "ON" : "OFF");
};

// ================= SMOOTH =================
function animateMarker(start, end, duration = 2000) {
  let startTime = Date.now();

  function animate() {
    let now = Date.now();
    let progress = (now - startTime) / duration;

    if (progress > 1) progress = 1;

    let lat = start[0] + (end[0] - start[0]) * progress;
    let lon = start[1] + (end[1] - start[1]) * progress;

    marker.setLatLng([lat, lon]);

    if (autoFollow) {
      map.setView([lat, lon], map.getZoom());
    }

    if (progress < 1) {
      requestAnimationFrame(animate);
    }
  }

  animate();
}

// ================= UPDATE =================
async function updateMap() {
  try {
    const response = await fetch("https://api.thingspeak.com/channels/3317591/feeds.json?results=50");
    const data = await response.json();

    let path = [];

    data.feeds.forEach(d => {
      if (d.field5 && d.field6) {
        path.push([
          parseFloat(d.field5),
          parseFloat(d.field6)
        ]);
      }
    });

    if (path.length === 0) return;

    let newPoint = path[path.length - 1];

    polyline.setLatLngs(path);

    if (!currentPosition) {
      currentPosition = newPoint;
      marker.setLatLng(newPoint);
      return;
    }

    // STATUS
    let status = "STOP";

    let dist = Math.sqrt(
      Math.pow(newPoint[0] - currentPosition[0], 2) +
      Math.pow(newPoint[1] - currentPosition[1], 2)
    );

    if (dist > 0.00005) {
      status = "JALAN";
    }

    document.getElementById("info").innerHTML =
      "Status: " + status + "<br>" +
      "Kendaraan: EV-001";

    // ANIMASI
    animateMarker(currentPosition, newPoint);

    currentPosition = newPoint;

  } catch (err) {
    console.error(err);
  }
}

// ================= REALTIME =================
updateMap();
setInterval(updateMap, 5000);

</script>

</body>
</html>
